global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: [localhost:9090]

  - job_name: 'cortexbuild-api'
    static_configs:
      - targets: [cortexbuild-api:3001]
    metrics_path: /api/metrics
    params:
      format: [prometheus]
    scrape_interval: 15s

  - job_name: 'cortexbuild-postgres'
    static_configs:
      - targets: [cortexbuild-db:5432]
    scrape_interval: 30s
