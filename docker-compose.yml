version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cortexbuild-db
    restart: always
    environment:
      POSTGRES_USER: cortexbuild
      POSTGRES_PASSWORD: C0rt3xBu1ld_S3cur3_P@ss
      POSTGRES_DB: cortexbuild
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cortexbuild
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortexbuild"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cortexbuild-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cortexbuild
    command: redis-server --appendonly yes

  # Ollama Local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: cortexbuild-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - cortexbuild

  # Express API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cortexbuild-api
    restart: always
    environment:
      DATABASE_URL: postgresql://cortexbuild:C0rt3xBu1ld_S3cur3_P@ss@postgres:5432/cortexbuild?schema=public
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cortexbuild
      DB_USER: cortexbuild
      DB_PASSWORD: C0rt3xBu1ld_S3cur3_P@ss
      JWT_SECRET: cortexbuild_jwt_secret_change_this_in_production
      PORT: 3001
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen3.5:latest
    ports:
      - "3001:3001"
    networks:
      - cortexbuild
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cortexbuild-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./dist:/var/www/cortexbuild-ultimate/dist:ro
    networks:
      - cortexbuild
    depends_on:
      - api

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: cortexbuild-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cortexbuild
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: cortexbuild-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: C0rt3xBu1ld_Grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      - cortexbuild
    depends_on:
      - prometheus

networks:
  cortexbuild:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:
