services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortexbuild-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortexbuild_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cortexbuild
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortexbuild"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cortexbuild-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cortexbuild
    command: redis-server --appendonly yes

  ollama:
    image: ollama/ollama:latest
    container_name: cortexbuild-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - cortexbuild

  api:
    image: cortexbuild-ultimate-api:latest
    container_name: cortexbuild-api
    restart: always
    environment:
      # App uses DB_* via server/db.js (not DATABASE_URL). Keep password in sync with postgres service.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-cortexbuild}
      DB_USER: ${POSTGRES_USER:-cortexbuild}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-cortexbuild_dev_password}
      JWT_SECRET: ${JWT_SECRET:-cortexbuild_dev_jwt_secret_change_in_production}
      SESSION_SECRET: ${SESSION_SECRET:-cortexbuild_dev_jwt_secret_change_in_production}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:latest}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://cortexbuildpro.com,https://www.cortexbuildpro.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.cortexbuildpro.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://www.cortexbuildpro.com/api/auth/google/callback}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
      MICROSOFT_CALLBACK_URL: ${MICROSOFT_CALLBACK_URL:-https://www.cortexbuildpro.com/api/auth/microsoft/callback}
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - cortexbuild
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: cortexbuild-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./dist:/var/www/cortexbuild-ultimate/dist:rw
    networks:
      - cortexbuild
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    container_name: cortexbuild-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - cortexbuild
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: cortexbuild-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-cortexbuild_dev_grafana}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - cortexbuild
    depends_on:
      - prometheus

networks:
  cortexbuild:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data: