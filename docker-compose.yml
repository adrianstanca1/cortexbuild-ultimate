# =============================================================================
# CortexBuild Ultimate - Docker Compose Configuration
# =============================================================================
# Enhanced with:
#   - Optimized healthchecks with better timeouts
#   - Resource limits for production stability
#   - Proper restart policies
#   - Logging configurations
#   - Network isolation
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortexbuild-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortexbuild_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cortexbuild
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexbuild} -d ${POSTGRES_DB:-cortexbuild}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: cortexbuild-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - cortexbuild
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: cortexbuild-ultimate-api:latest
    container_name: cortexbuild-api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-cortexbuild}
      DB_USER: ${POSTGRES_USER:-cortexbuild}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      REDIS_HOST: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://172.18.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:latest}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set for production}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.cortexbuildpro.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://www.cortexbuildpro.com/api/auth/google/callback}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
      MICROSOFT_CALLBACK_URL: ${MICROSOFT_CALLBACK_URL:-https://www.cortexbuildpro.com/api/auth/microsoft/callback}
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - cortexbuild
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    mem_limit: 1g
    memswap_limit: 1g

networks:
  cortexbuild:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
