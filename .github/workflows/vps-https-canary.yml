# HTTPS-only checks against production (no SSH). Catches outages / TLS issues
# even when GitHub Actions cannot reach the VPS on port 22.
name: VPS HTTPS canary

on:
  schedule:
    - cron: '25 */6 * * *'
  workflow_dispatch:

concurrency:
  group: vps-canary
  cancel-in-progress: false

jobs:
  health:
    name: Production health contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify www + apex API health
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, sys, urllib.request

          def check(url: str) -> None:
              req = urllib.request.Request(url, headers={"User-Agent": "cortexbuild-canary/1"})
              with urllib.request.urlopen(req, timeout=20) as r:
                  body = r.read().decode()
              d = json.loads(body)
              c = d.get("checks") or {}
              assert d.get("status") == "ok", d
              assert c.get("postgres") is True
              assert c.get("redis") is True

          for host in ("www.cortexbuildpro.com", "cortexbuildpro.com"):
              check(f"https://{host}/api/health")
              print(f"OK {host}")
          PY
