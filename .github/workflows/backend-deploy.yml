name: Backend API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/backend-deploy.yml'
      - 'server/**' # Only trigger if changes are in the server directory
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22' # Updated to Node.js 22
        cache: 'npm' # Cache npm dependencies
        cache-dependency-path: './server/package-lock.json'

    - name: Install dependencies
      run: npm install
      working-directory: ./server

    - name: Run API Tests
      run: npm test
      working-directory: ./server

    - name: Set up Docker BuildX
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: adrianstanca1/cortexbuild-ultimate-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-test-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Deploy to VPS
      env:
        VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USER: ${{ secrets.VPS_USER }}
      run: |
        mkdir -p ~/.ssh
        echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$VPS_USER@$VPS_HOST" "cd /root/cortexbuild-work && docker compose pull api && docker compose up -d api" || echo "Docker deploy not available"
        echo "Deployment complete."
