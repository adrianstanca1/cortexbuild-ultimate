name: Backend API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**' # Only trigger if changes are in the server directory
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Updated to Node.js 22
        cache: 'npm' # Cache npm dependencies
        cache-dependency-path: './server/package-lock.json'

    - name: Install dependencies
      run: npm install
      working-directory: ./server

    - name: Run API Tests
      run: npm test
      working-directory: ./server

    - name: Set up Docker BuildX
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: adrianstanca1/cortexbuild-ultimate-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-test-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        script: |
          cd /root/cortexbuild-work # Navigate to the directory containing docker-compose.yml
          echo "Pulling latest Docker image..."
          docker compose pull api
          echo "Restarting API service..."
          docker compose up -d api
          echo "Deployment complete. Please check the API status on the VPS."
