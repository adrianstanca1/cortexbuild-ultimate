name: Backend API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/backend-deploy.yml'
      - 'server/**' # Only trigger if changes are in the server directory
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22' # Updated to Node.js 22
        cache: 'npm' # Cache npm dependencies
        cache-dependency-path: './server/package-lock.json'

    - name: Install dependencies
      run: npm install
      working-directory: ./server

    - name: Run API Tests
      run: npm test
      working-directory: ./server

    - name: Set up Docker BuildX
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: adrianstanca1/cortexbuild-ultimate-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-test-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Start SSH Agent
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Deploy to VPS
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        chmod 600 ~/.ssh/known_hosts
        ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "cd /root/cortexbuild-work && docker compose pull api && docker compose up -d api"
        echo "Deployment complete. Please check the API status on the VPS."
