name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Verify Node and npm on PATH
      run: node -v && npm -v && command -v npm

    - name: Install dependencies
      run: npm ci

    - name: Type checking
      run: npm run typecheck

    - name: Linting
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build production
      run: npm run build

    - name: Verify server routes
      run: npm run verify:routes
