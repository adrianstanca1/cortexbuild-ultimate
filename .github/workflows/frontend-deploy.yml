name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22' # Updated to Node.js 22

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Verify build output
      run: |
        echo "Contents of current directory:"
        ls -la
        echo "Contents of dist directory:"
        ls -la dist/ || echo "dist directory not found"

    - name: Deploy to VPS with rsync
      env:
        VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USER: ${{ secrets.VPS_USER }}
      run: |
        mkdir -p ~/.ssh
        echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" ./dist/ "$VPS_USER@$VPS_HOST:/var/www/cortexbuild-ultimate/dist/"

    - name: Verify deployment (optional)
      run: echo "Deployment command initiated. Please check your GitHub Actions for successful file transfer."
