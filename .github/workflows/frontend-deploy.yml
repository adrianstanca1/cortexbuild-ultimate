name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22' # Updated to Node.js 22

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Verify build output
      run: |
        echo "Contents of current directory:"
        ls -la
        echo "Contents of dist directory:"
        ls -la dist/ || echo "dist directory not found"

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Deploy to VPS with rsync
      run: |
        # Create target directory if it doesn't exist on the VPS
        ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "mkdir -p /var/www/cortexbuild-ultimate/dist"
        
        # Use rsync to synchronize the build output
        rsync -avz --delete -e "ssh -p 22" ./dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/cortexbuild-ultimate/dist/

    - name: Verify deployment (optional)
      run: echo "Deployment command initiated. Please check your GitHub Actions for successful file transfer."
