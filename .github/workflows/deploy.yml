name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 72.62.132.43
  VPS_USER: root
  VPS_PATH: /var/www/cortexbuild-ultimate

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SSH
        env:
          VPS_PASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          # Fall back to deploy.sh credential if secret not configured yet
          PASS="${VPS_PASS:-Cumparavinde12@}"
          export SSHPASS="$PASS"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=30"

          sshpass -e ssh $SSH_OPTS ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "
            set -e
            cd ${{ env.VPS_PATH }}
            echo '→ Pulling latest code...'
            git pull origin main
            echo '→ Installing any new dependencies...'
            npm ci --prefer-offline 2>/dev/null || npm install
            echo '→ Building frontend...'
            npm run build
            echo '→ Restarting nginx...'
            docker restart cortexbuild-nginx
            sleep 3
            STATUS=\$(curl -sf -o /dev/null -w '%{http_code}' https://www.cortexbuildpro.com/ || echo 000)
            echo \"Site status: \$STATUS\"
            [ \"\$STATUS\" = '200' ] && echo 'cortexbuildpro.com is live' || (echo 'WARNING: unexpected status'; docker logs cortexbuild-nginx --tail=10)
          "

