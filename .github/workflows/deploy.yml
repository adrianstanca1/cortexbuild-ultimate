name: Build & Deploy CortexBuild Ultimate

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Patch index.html for GitHub Pages base path
        run: |
          sed -i "s|src=\"/assets/|src=\"./assets/|g" dist/index.html
          sed -i "s|href=\"/assets/|href=\"./assets/|g" dist/index.html
          sed -i "s|href=\"/favicon|href=\"./favicon|g" dist/index.html
          sed -i "s|href=\"/icons/|href=\"./icons/|g" dist/index.html
          sed -i "s|href=\"/manifest.json\"|href=\"./manifest.json\"|g" dist/index.html
          echo "Patched index.html:"
          grep -E "(src|href)=" dist/index.html | head -20

      - name: Add GitHub Pages support files
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false

