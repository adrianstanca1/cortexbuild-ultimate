name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors only)
        run: npx eslint src --ext .ts,.tsx --quiet

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          # Prefer SSH_HOST; fall back to VPS_HOST (used by cd.yml) so one misnamed secret does not brick deploys.
          host: ${{ secrets.SSH_HOST || secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USERNAME || 'root' }}
          port: 22
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ""
          # Dial can be slow across regions / noisy networks; remote script still has command_timeout.
          timeout: 15m
          command_timeout: 120m
          script: |
            set -e
            # Copy deploy scripts
            mkdir -p /root
            cat > /root/deploy-frontend.sh << 'DEPLOYEOF'
            #!/bin/bash
            set -euo pipefail
            echo "=== CortexBuild Frontend Deploy ==="
            REPO_URL="https://github.com/adrianstanca1/cortexbuild-ultimate.git"
            resolve_project_dir() {
              local candidates=(
                "/var/www/cortexbuild-ultimate"
                "/var/www/cortexbuild-work"
                "/var/www/html/cortexbuild-ultimate"
                "/var/www/html/cortexbuild-work"
                "/var/www/cortexbuildpro"
                "/var/www/cortexbuildpro-ultimate"
                "/root/cortexbuild-work"
                "/root/cortexbuild-ultimate"
                "/root/cortexbuildpro"
                "/root/cortexbuildpro-ultimate"
                "$HOME/cortexbuild-ultimate"
                "$HOME/cortexbuild-work"
                "$HOME/cortexbuildpro"
                "$HOME/cortexbuildpro-ultimate"
                "/var/www/*"
                "/var/www/*/*"
                "/var/www/html/*"
                "/var/www/html/*/*"
                "/root/*"
                "/root/*/*"
                "/home/*/*"
                "/home/*/*/*"
                "/opt/*"
                "/opt/*/*"
                "/srv/*"
                "/srv/*/*"
              )
              local p
              for p in "${candidates[@]}"; do
                if [ -f "$p/package.json" ]; then
                  echo "$p"
                  return 0
                fi
              done
              return 1
            }
            PROJECT_DIR="$(resolve_project_dir || true)"
            if [ -z "${PROJECT_DIR:-}" ]; then
              PROJECT_DIR="$HOME/cortexbuild-ultimate"
              echo "Project directory not found. Bootstrapping at $PROJECT_DIR"
              if [ ! -d "$PROJECT_DIR/.git" ]; then
                git clone "$REPO_URL" "$PROJECT_DIR"
              fi
            fi
            echo "Using project dir: $PROJECT_DIR"
            cd "$PROJECT_DIR"
            git config --global --add safe.directory "$PROJECT_DIR" || true
            git fetch origin
            git reset --hard origin/main
            npm ci --ignore-scripts
            npm run build
            chown -R www-data:www-data "$PROJECT_DIR/dist"
            echo "=== Frontend Deploy Complete ==="
            DEPLOYEOF
            cat > /root/deploy-api.sh << 'DEPLOYEOF'
            #!/bin/bash
            set -euo pipefail
            echo "=== CortexBuild API Deploy ==="
            REPO_URL="https://github.com/adrianstanca1/cortexbuild-ultimate.git"
            resolve_project_dir() {
              local candidates=(
                "/var/www/cortexbuild-ultimate"
                "/var/www/cortexbuild-work"
                "/var/www/html/cortexbuild-ultimate"
                "/var/www/html/cortexbuild-work"
                "/var/www/cortexbuildpro"
                "/var/www/cortexbuildpro-ultimate"
                "/root/cortexbuild-work"
                "/root/cortexbuild-ultimate"
                "/root/cortexbuildpro"
                "/root/cortexbuildpro-ultimate"
                "$HOME/cortexbuild-ultimate"
                "$HOME/cortexbuild-work"
                "$HOME/cortexbuildpro"
                "$HOME/cortexbuildpro-ultimate"
                "/var/www/*"
                "/var/www/*/*"
                "/var/www/html/*"
                "/var/www/html/*/*"
                "/root/*"
                "/root/*/*"
                "/home/*/*"
                "/home/*/*/*"
                "/opt/*"
                "/opt/*/*"
                "/srv/*"
                "/srv/*/*"
              )
              local p
              for p in "${candidates[@]}"; do
                if [ -f "$p/package.json" ]; then
                  echo "$p"
                  return 0
                fi
              done
              return 1
            }
            PROJECT_DIR="$(resolve_project_dir || true)"
            if [ -z "${PROJECT_DIR:-}" ]; then
              PROJECT_DIR="$HOME/cortexbuild-ultimate"
              echo "Project directory not found. Bootstrapping at $PROJECT_DIR"
              if [ ! -d "$PROJECT_DIR/.git" ]; then
                git clone "$REPO_URL" "$PROJECT_DIR"
              fi
            fi
            echo "Using project dir: $PROJECT_DIR"
            CONTAINER_NAME="cortexbuild-api"
            IMAGE_NAME="cortexbuild-ultimate-api:latest"
            cd "$PROJECT_DIR"
            git config --global --add safe.directory "$PROJECT_DIR" || true

            git fetch origin
            git reset --hard origin/main

            # Load environment variables BEFORE docker commands
            set +u
            set -a
            if [ -f "$PROJECT_DIR/.env" ]; then
              source "$PROJECT_DIR/.env"
            fi
            if [ -f "$PROJECT_DIR/server/.env" ]; then
              source "$PROJECT_DIR/server/.env"
            fi
            set +a
            set -u

            # Recover secrets from existing container if available
            if docker ps -a --format '{{.Names}}' | grep -Fx "$CONTAINER_NAME" >/dev/null 2>&1; then
              EXISTING_ENV=$(docker inspect "$CONTAINER_NAME" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null || true)
              if [ -n "$EXISTING_ENV" ]; then
                [ -z "${JWT_SECRET:-}" ] && JWT_SECRET=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^JWT_SECRET=//p' | tail -n 1)
                [ -z "${SESSION_SECRET:-}" ] && SESSION_SECRET=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^SESSION_SECRET=//p' | tail -n 1)
                if [ -z "${POSTGRES_PASSWORD:-}" ] && [ -z "${DB_PASSWORD:-}" ]; then
                  DB_PASSWORD=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^DB_PASSWORD=//p' | tail -n 1)
                  [ -z "${DB_PASSWORD:-}" ] && POSTGRES_PASSWORD=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^POSTGRES_PASSWORD=//p' | tail -n 1)
                fi
              fi
            fi

            # Load from host env files as fallback
            for env_file in "$HOME/.env" "/root/.env" "/etc/cortexbuild.env" "/etc/environment"; do
              if [ -f "$env_file" ]; then
                set +u
                set -a
                source "$env_file" || true
                set +a
                set -u
              fi
            done

            # Final fallback: GitHub Actions secrets (expanded when this workflow runs).
            [ -z "${JWT_SECRET:-}" ] && JWT_SECRET="${{ secrets.JWT_SECRET }}"
            [ -z "${SESSION_SECRET:-}" ] && SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
            [ -z "${DB_PASSWORD:-}" ] && DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            [ -z "${POSTGRES_PASSWORD:-}" ] && POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            [ -z "${GOOGLE_CLIENT_ID:-}" ] && GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            [ -z "${GOOGLE_CLIENT_SECRET:-}" ] && GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            [ -z "${GOOGLE_CALLBACK_URL:-}" ] && GOOGLE_CALLBACK_URL="https://www.cortexbuildpro.com/api/auth/google/callback"

            # Env vars JWT_SECRET, SESSION_SECRET, POSTGRES_PASSWORD, DB_PASSWORD are set by GitHub Actions env:
            JWT_SECRET="${JWT_SECRET:-}"
            SESSION_SECRET="${SESSION_SECRET:-}"
            POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-}"
            DB_PASSWORD="${DB_PASSWORD:-}"

            # Get actual DB password
            ACTUAL_DB_PASSWORD="${POSTGRES_PASSWORD:-${DB_PASSWORD}}"

            # Validate required secrets
            if [ -z "${JWT_SECRET:-}" ] || [ -z "${SESSION_SECRET:-}" ] || [ -z "${ACTUAL_DB_PASSWORD:-}" ]; then
              echo "FATAL: Missing required secrets (JWT_SECRET, SESSION_SECRET, or DB_PASSWORD)"
              exit 1
            fi

            docker build -t "$IMAGE_NAME" -f Dockerfile.api .

            # Ensure postgres container exists and is running
            if ! docker ps --format '{{.Names}}' | grep -Fx cortexbuild-db >/dev/null 2>&1; then
              echo "Creating postgres container..."
              docker run -d --name cortexbuild-db \
                --network host \
                -e POSTGRES_USER=cortexbuild \
                -e POSTGRES_PASSWORD="$ACTUAL_DB_PASSWORD" \
                -e POSTGRES_DB=cortexbuild \
                pgvector/pgvector:pg16 2>&1 || true
            else
              docker start cortexbuild-db 2>&1 || true
            fi

            # Ensure redis container exists and is running
            if ! docker ps --format '{{.Names}}' | grep -Fx cortexbuild-redis >/dev/null 2>&1; then
              echo "Creating redis container..."
              docker run -d --name cortexbuild-redis \
                --network host \
                redis:7-alpine 2>&1 || true
            else
              docker start cortexbuild-redis 2>&1 || true
            fi

            # Ensure ollama container exists and is running (API uses 127.0.0.1:11434 with --network host)
            if docker ps --format '{{.Names}}' | grep -Fx cortexbuild-ollama >/dev/null 2>&1; then
              :
            elif docker ps -a --format '{{.Names}}' | grep -Fx cortexbuild-ollama >/dev/null 2>&1; then
              echo "Starting ollama container..."
              docker start cortexbuild-ollama 2>&1 || true
            else
              echo "Creating ollama container..."
              docker volume create ollama_data >/dev/null 2>&1 || true
              docker run -d --name cortexbuild-ollama \
                --restart always \
                --network host \
                -v ollama_data:/root/.ollama \
                ollama/ollama:latest 2>&1 || true
            fi

            # Wait for postgres to be ready
            for i in $(seq 1 30); do
              if docker exec cortexbuild-db pg_isready -U cortexbuild >/dev/null 2>&1; then
                echo "Postgres is ready"
                break
              fi
              echo "Waiting for postgres..."
              sleep 2
            done

            # Validate required secrets are present
            if [ -z "${JWT_SECRET:-}" ]; then
              echo "FATAL: JWT_SECRET not set in $PROJECT_DIR/.env or $PROJECT_DIR/server/.env"
              exit 1
            fi
            if [ -z "${SESSION_SECRET:-}" ]; then
              echo "FATAL: SESSION_SECRET not set in $PROJECT_DIR/.env or $PROJECT_DIR/server/.env"
              exit 1
            fi
            echo "Deploying with secure credentials from .env"

            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            # Free conflicting port bindings from stale containers/processes.
            CONFLICTING_CONTAINERS="$(docker ps -aq --filter 'publish=3001' 2>/dev/null || true)"
            if [ -n "${CONFLICTING_CONTAINERS:-}" ]; then
              echo "$CONFLICTING_CONTAINERS" | xargs -r docker stop >/dev/null 2>&1 || true
              echo "$CONFLICTING_CONTAINERS" | xargs -r docker rm >/dev/null 2>&1 || true
            fi
            if command -v lsof >/dev/null 2>&1; then
              PORT_PIDS="$(lsof -ti tcp:3001 -sTCP:LISTEN 2>/dev/null || true)"
              if [ -n "${PORT_PIDS:-}" ]; then
                echo "$PORT_PIDS" | xargs -r kill -TERM >/dev/null 2>&1 || true
                sleep 2
              fi
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart always \
              --network host \
              -e DB_HOST=127.0.0.1 \
              -e DB_PORT=5432 \
              -e DB_NAME=cortexbuild \
              -e DB_USER=cortexbuild \
              -e DB_PASSWORD="$ACTUAL_DB_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e SESSION_SECRET="$SESSION_SECRET" \
              -e REDIS_HOST=127.0.0.1 \
              -e PORT=3001 \
              -e NODE_ENV=production \
              -e OLLAMA_HOST=http://127.0.0.1:11434 \
              -e OLLAMA_MODEL=gemma4:latest \
              -e EMBEDDING_MODEL="${EMBEDDING_MODEL:-nomic-embed-text:latest}" \
              -e CORS_ORIGIN=https://www.cortexbuildpro.com,https://cortexbuildpro.com \
              -e FRONTEND_URL=https://www.cortexbuildpro.com \
              -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              -e GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
              -e GOOGLE_CALLBACK_URL="$GOOGLE_CALLBACK_URL" \
              "$IMAGE_NAME"
            echo "Waiting for API health..."
            check_cortex_health() {
              local payload
              payload=$(curl --connect-timeout 2 --max-time 5 -fsS http://localhost:3001/api/health 2>/dev/null || true)
              [ -n "$payload" ] || return 1
              python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$payload" >/dev/null 2>&1
            }
            for i in $(seq 1 30); do
              if check_cortex_health; then
                echo "API health contract verified on localhost:3001"
                break
              fi
              sleep 2
            done
            if ! check_cortex_health; then
              echo "FATAL: API health contract failed on localhost:3001"
              docker logs --tail 50 "$CONTAINER_NAME" || true
              exit 1
            fi

            # Restart nginx to refresh DNS resolution for new container
            echo "Restarting nginx..."
            systemctl restart nginx || service nginx restart || nginx -s reload || true
            sleep 5

            # Final local + public checks
            if ! check_cortex_health; then
              echo "FATAL: API no longer healthy after nginx restart"
              exit 1
            fi
            for i in $(seq 1 20); do
              external_payload=$(curl --connect-timeout 5 --max-time 10 -fsS https://www.cortexbuildpro.com/api/health 2>/dev/null || true)
              if [ -n "$external_payload" ] && python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$external_payload" >/dev/null 2>&1; then
                echo "External HTTPS health contract verified"
                break
              fi
              sleep 3
            done
            if ! external_payload=$(curl --connect-timeout 5 --max-time 10 -fsS https://www.cortexbuildpro.com/api/health 2>/dev/null || true) || ! [ -n "$external_payload" ] || ! python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$external_payload" >/dev/null 2>&1; then
              echo "FATAL: External HTTPS health contract failed after deploy"
              exit 1
            fi

            echo "=== API Deploy Complete ==="
            DEPLOYEOF
            chmod +x /root/deploy-frontend.sh /root/deploy-api.sh

            # Run frontend deploy
            bash /root/deploy-frontend.sh

            # Run API deploy
            bash /root/deploy-api.sh

      - name: Verify deployment
        run: |
          set -euo pipefail

          # Rely on HTTPS + /api/health. Retry full verification a few times: nginx/DNS
          # can be briefly inconsistent right after a deploy even when the API is healthy.
          check_https_health_contract() {
            local domain="$1"
            local attempts=36
            local i payload
            for i in $(seq 1 "$attempts"); do
              payload=$(curl --connect-timeout 8 --max-time 15 -fsS "https://${domain}/api/health" 2>/dev/null || true)
              if [ -n "$payload" ] && python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$payload" >/dev/null 2>&1; then
                echo "✅ ${domain} HTTPS API health contract verified"
                return 0
              fi
              sleep 5
            done
            echo "❌ ${domain} HTTPS API health contract failed"
            return 1
          }

          for round in 1 2 3; do
            echo "=== Post-deploy verify round ${round}/3 ==="
            if check_https_health_contract cortexbuildpro.com && check_https_health_contract www.cortexbuildpro.com; then
              echo "✅ All external health checks passed"
              exit 0
            fi
            echo "Round ${round} failed; waiting 45s before retry..."
            sleep 45
          done
          echo "❌ Post-deploy verify failed after 3 rounds"
          exit 1
