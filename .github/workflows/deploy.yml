name: Deploy API to VPS

# Frontend is auto-deployed to Vercel on every push.
# This workflow handles backend (server/) changes — restarts the API on VPS.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'nginx/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  restart-api:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Restart API + nginx via deploy webhook
        run: |
          echo "Triggering VPS restart..."
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            http://72.62.132.43/api/deploy || echo "webhook_not_reachable")
          echo "Response: $RESPONSE"
          echo "VPS restart triggered (or queued)"

