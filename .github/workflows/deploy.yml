name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors only)
        run: npx eslint src --ext .ts,.tsx --quiet

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 45m
          script: |
            set -e
            # Copy deploy scripts
            mkdir -p /root
            cat > /root/deploy-frontend.sh << 'DEPLOYEOF'
            #!/bin/bash
            set -euo pipefail
            echo "=== CortexBuild Frontend Deploy ==="
            REPO_URL="https://github.com/adrianstanca1/cortexbuild-ultimate.git"
            resolve_project_dir() {
              local candidates=(
                "/var/www/cortexbuild-ultimate"
                "/var/www/cortexbuild-work"
                "/var/www/html/cortexbuild-ultimate"
                "/var/www/html/cortexbuild-work"
                "/var/www/cortexbuildpro"
                "/var/www/cortexbuildpro-ultimate"
                "/root/cortexbuild-work"
                "/root/cortexbuild-ultimate"
                "/root/cortexbuildpro"
                "/root/cortexbuildpro-ultimate"
                "$HOME/cortexbuild-ultimate"
                "$HOME/cortexbuild-work"
                "$HOME/cortexbuildpro"
                "$HOME/cortexbuildpro-ultimate"
                "/var/www/*"
                "/var/www/*/*"
                "/var/www/html/*"
                "/var/www/html/*/*"
                "/root/*"
                "/root/*/*"
                "/home/*/*"
                "/home/*/*/*"
                "/opt/*"
                "/opt/*/*"
                "/srv/*"
                "/srv/*/*"
              )
              local p
              for p in "${candidates[@]}"; do
                if [ -f "$p/package.json" ]; then
                  echo "$p"
                  return 0
                fi
              done
              return 1
            }
            PROJECT_DIR="$(resolve_project_dir || true)"
            if [ -z "${PROJECT_DIR:-}" ]; then
              PROJECT_DIR="$HOME/cortexbuild-ultimate"
              echo "Project directory not found. Bootstrapping at $PROJECT_DIR"
              if [ ! -d "$PROJECT_DIR/.git" ]; then
                git clone "$REPO_URL" "$PROJECT_DIR"
              fi
            fi
            echo "Using project dir: $PROJECT_DIR"
            cd "$PROJECT_DIR"
            git pull origin main
            npm ci --ignore-scripts
            npm run build
            chown -R www-data:www-data "$PROJECT_DIR/dist"
            echo "=== Frontend Deploy Complete ==="
            DEPLOYEOF
            cat > /root/deploy-api.sh << 'DEPLOYEOF'
            #!/bin/bash
            set -euo pipefail
            echo "=== CortexBuild API Deploy ==="
            REPO_URL="https://github.com/adrianstanca1/cortexbuild-ultimate.git"
            resolve_project_dir() {
              local candidates=(
                "/var/www/cortexbuild-ultimate"
                "/var/www/cortexbuild-work"
                "/var/www/html/cortexbuild-ultimate"
                "/var/www/html/cortexbuild-work"
                "/var/www/cortexbuildpro"
                "/var/www/cortexbuildpro-ultimate"
                "/root/cortexbuild-work"
                "/root/cortexbuild-ultimate"
                "/root/cortexbuildpro"
                "/root/cortexbuildpro-ultimate"
                "$HOME/cortexbuild-ultimate"
                "$HOME/cortexbuild-work"
                "$HOME/cortexbuildpro"
                "$HOME/cortexbuildpro-ultimate"
                "/var/www/*"
                "/var/www/*/*"
                "/var/www/html/*"
                "/var/www/html/*/*"
                "/root/*"
                "/root/*/*"
                "/home/*/*"
                "/home/*/*/*"
                "/opt/*"
                "/opt/*/*"
                "/srv/*"
                "/srv/*/*"
              )
              local p
              for p in "${candidates[@]}"; do
                if [ -f "$p/package.json" ]; then
                  echo "$p"
                  return 0
                fi
              done
              return 1
            }
            PROJECT_DIR="$(resolve_project_dir || true)"
            if [ -z "${PROJECT_DIR:-}" ]; then
              PROJECT_DIR="$HOME/cortexbuild-ultimate"
              echo "Project directory not found. Bootstrapping at $PROJECT_DIR"
              if [ ! -d "$PROJECT_DIR/.git" ]; then
                git clone "$REPO_URL" "$PROJECT_DIR"
              fi
            fi
            echo "Using project dir: $PROJECT_DIR"
            CONTAINER_NAME="cortexbuild-api"
            IMAGE_NAME="cortexbuild-ultimate-api:latest"
            cd "$PROJECT_DIR"

            # Ensure API can reach DB/Redis/Ollama on their network
            # Docker Compose creates 'cortexbuild-ultimate_cortexbuild' — use that.
            COMPOSE_NET="cortexbuild-ultimate_cortexbuild"
            FALLBACK_NET="cortexbuild"
            if docker network inspect "$COMPOSE_NET" >/dev/null 2>&1; then
              DOCKER_NET="$COMPOSE_NET"
            else
              if ! docker network inspect "$FALLBACK_NET" >/dev/null 2>&1; then
                echo "Creating $FALLBACK_NET network..."
                docker network create "$FALLBACK_NET"
              fi
              DOCKER_NET="$FALLBACK_NET"
            fi

            git pull origin main

            docker build -t "$IMAGE_NAME" -f Dockerfile.api .

            set +u
            set -a
            if [ -f "$PROJECT_DIR/.env" ]; then
              source "$PROJECT_DIR/.env"
            fi
            if [ -f "$PROJECT_DIR/server/.env" ]; then
              source "$PROJECT_DIR/server/.env"
            fi
            set +a
            set -u

            # Fallback: recover secrets from existing container env if files are incomplete
            if docker ps -a --format '{{.Names}}' | grep -Fx "$CONTAINER_NAME" >/dev/null 2>&1; then
              EXISTING_ENV=$(docker inspect "$CONTAINER_NAME" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null || true)
              if [ -n "$EXISTING_ENV" ]; then
                [ -z "${JWT_SECRET:-}" ] && JWT_SECRET=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^JWT_SECRET=//p' | tail -n 1)
                [ -z "${SESSION_SECRET:-}" ] && SESSION_SECRET=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^SESSION_SECRET=//p' | tail -n 1)
                if [ -z "${POSTGRES_PASSWORD:-}" ] && [ -z "${DB_PASSWORD:-}" ]; then
                  DB_PASSWORD=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^DB_PASSWORD=//p' | tail -n 1)
                  [ -z "${DB_PASSWORD:-}" ] && POSTGRES_PASSWORD=$(printf '%s\n' "$EXISTING_ENV" | sed -n 's/^POSTGRES_PASSWORD=//p' | tail -n 1)
                fi
              fi
            fi

            # Fallback: load secrets from common host env files.
            for env_file in "$HOME/.env" "/root/.env" "/etc/cortexbuild.env" "/etc/environment"; do
              if [ -f "$env_file" ]; then
                set +u
                set -a
                # shellcheck disable=SC1090
                source "$env_file" || true
                set +a
                set -u
              fi
            done

            # Final fallback: use GitHub Actions secrets if configured.
            [ -z "${JWT_SECRET:-}" ] && JWT_SECRET="${{ secrets.JWT_SECRET }}"
            [ -z "${SESSION_SECRET:-}" ] && SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
            [ -z "${DB_PASSWORD:-}" ] && DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            [ -z "${POSTGRES_PASSWORD:-}" ] && POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"

            # Validate required secrets are present
            if [ -z "${JWT_SECRET:-}" ]; then
              echo "FATAL: JWT_SECRET not set in $PROJECT_DIR/.env or $PROJECT_DIR/server/.env"
              exit 1
            fi
            if [ -z "${SESSION_SECRET:-}" ]; then
              echo "FATAL: SESSION_SECRET not set in $PROJECT_DIR/.env or $PROJECT_DIR/server/.env"
              exit 1
            fi
            if [ -z "${POSTGRES_PASSWORD:-}" ] && [ -z "${DB_PASSWORD:-}" ]; then
              echo "FATAL: Neither POSTGRES_PASSWORD nor DB_PASSWORD set in $PROJECT_DIR/.env or $PROJECT_DIR/server/.env"
              exit 1
            fi

            # Get the DB password
            ACTUAL_DB_PASSWORD="${POSTGRES_PASSWORD:-${DB_PASSWORD:-}}"
            echo "Deploying with secure credentials from .env"

            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart always \
              --network "$DOCKER_NET" \
              -p 127.0.0.1:3001:3001 \
              -e DB_HOST=cortexbuild-db \
              -e DB_PORT=5432 \
              -e DB_NAME=cortexbuild \
              -e DB_USER=cortexbuild \
              -e DB_PASSWORD="$ACTUAL_DB_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e SESSION_SECRET="$SESSION_SECRET" \
              -e REDIS_HOST=cortexbuild-redis \
              -e PORT=3001 \
              -e NODE_ENV=production \
              -e OLLAMA_HOST=http://cortexbuild-ollama:11434 \
              -e OLLAMA_MODEL=qwen3.5:latest \
              -e CORS_ORIGIN=https://www.cortexbuildpro.com,https://cortexbuildpro.com \
              -e FRONTEND_URL=https://www.cortexbuildpro.com \
              "$IMAGE_NAME"
            echo "Waiting for API health..."
            check_cortex_health() {
              local payload
              payload=$(curl -fsS http://localhost:3001/api/health 2>/dev/null || true)
              [ -n "$payload" ] || return 1
              python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$payload" >/dev/null 2>&1
            }
            for i in $(seq 1 30); do
              if check_cortex_health; then
                echo "API health contract verified on localhost:3001"
                break
              fi
              sleep 2
            done
            if ! check_cortex_health; then
              echo "FATAL: API health contract failed on localhost:3001"
              docker logs --tail 50 "$CONTAINER_NAME" || true
              exit 1
            fi

            # Restart nginx to refresh DNS resolution for new container
            echo "Restarting nginx..."
            systemctl restart nginx || service nginx restart || nginx -s reload || true
            sleep 5

            # Final local + public checks
            if ! check_cortex_health; then
              echo "FATAL: API no longer healthy after nginx restart"
              exit 1
            fi
            for i in $(seq 1 20); do
              external_payload=$(curl -fsS https://www.cortexbuildpro.com/api/health 2>/dev/null || true)
              if [ -n "$external_payload" ] && python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$external_payload" >/dev/null 2>&1; then
                echo "External HTTPS health contract verified"
                break
              fi
              sleep 3
            done
            if ! external_payload=$(curl -fsS https://www.cortexbuildpro.com/api/health 2>/dev/null || true) || ! [ -n "$external_payload" ] || ! python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$external_payload" >/dev/null 2>&1; then
              echo "FATAL: External HTTPS health contract failed after deploy"
              exit 1
            fi

            echo "=== API Deploy Complete ==="
            DEPLOYEOF
            chmod +x /root/deploy-frontend.sh /root/deploy-api.sh

            # Run frontend deploy
            bash /root/deploy-frontend.sh

            # Run API deploy
            bash /root/deploy-api.sh

      - name: Verify deployment
        run: |
          set -euo pipefail

          check_tls() {
            local domain="$1"
            echo | openssl s_client -connect "${domain}:443" -servername "${domain}" -brief >/dev/null 2>&1
          }

          check_https_health_contract() {
            local domain="$1"
            local attempts=30
            local i payload
            for i in $(seq 1 "$attempts"); do
              payload=$(curl -fsS "https://${domain}/api/health" 2>/dev/null || true)
              if [ -n "$payload" ] && python3 -c "import json,sys; d=json.loads(sys.argv[1]); c=d.get('checks') or {}; assert d.get('status')=='ok'; assert c.get('postgres') is True; assert c.get('redis') is True" "$payload" >/dev/null 2>&1; then
                echo "✅ ${domain} HTTPS API health contract verified"
                return 0
              fi
              sleep 5
            done
            echo "❌ ${domain} HTTPS API health contract failed"
            return 1
          }

          check_tls cortexbuildpro.com
          check_tls www.cortexbuildpro.com
          check_https_health_contract cortexbuildpro.com
          check_https_health_contract www.cortexbuildpro.com
