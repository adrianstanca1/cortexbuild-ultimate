name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Triggering deploy on cortexbuildpro.com..."
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            https://www.cortexbuildpro.com/api/deploy)
          echo "Response: $RESPONSE"

      - name: Wait for deploy to complete
        run: |
          echo "Waiting for build to finish (~3 min)..."
          for i in $(seq 1 24); do
            sleep 15
            STATUS=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
              https://www.cortexbuildpro.com/api/deploy/status 2>/dev/null || echo '{"deploying":true}')
            DEPLOYING=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deploying', True))" 2>/dev/null || echo "True")
            echo "[$i] deploying=$DEPLOYING"
            if [ "$DEPLOYING" = "False" ]; then
              echo "Deploy finished"
              break
            fi
          done

      - name: Verify site is live
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" https://www.cortexbuildpro.com/ || echo "000")
          echo "Site returned: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] && echo "cortexbuildpro.com is live" || (echo "WARNING: unexpected status $HTTP_CODE"; exit 1)

