name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.132.43
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 12m
          script: |
            set -e
            cd /var/www/cortexbuild-ultimate

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing any new dependencies..."
            npm ci --prefer-offline 2>/dev/null || npm install

            echo "Building frontend..."
            npm run build

            echo "Restarting nginx container..."
            docker restart cortexbuild-nginx

            echo "Verifying site is up..."
            sleep 3
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://www.cortexbuildpro.com/ || echo "000")
            echo "Site status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "WARNING: site returned $STATUS"
              docker logs cortexbuild-nginx --tail=20
            else
              echo "cortexbuildpro.com is live and healthy"
            fi

