name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors only)
        run: npx eslint src --ext .ts,.tsx --quiet

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH (key auth)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          echo "✅ SSH ready (key auth)"

      - name: Copy deploy scripts to VPS
        run: |
          scp -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts \
            -i ~/.ssh/id_ed25519 \
            deploy/deploy-frontend.sh deploy/deploy-api.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.SSH_HOST }}:/root/

      - name: Build & deploy frontend on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.SSH_HOST }} \
            "bash /root/deploy-frontend.sh"

      - name: Restart API container
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.SSH_HOST }} \
            "bash /root/deploy-api.sh"

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://www.cortexbuildpro.com/api/health)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Deployment verified - HTTP $STATUS"
          else
            echo "❌ Deployment verification failed - HTTP $STATUS"
            exit 1
          fi
