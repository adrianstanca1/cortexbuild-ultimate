name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors only)
        run: npx eslint src --ext .ts,.tsx --quiet

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # Write key with proper newlines (handles both raw and escaped formats)
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | sed 's/\\n/\n/g' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          # Validate key loaded correctly
          ssh-keygen -l -f ~/.ssh/id_ed25519 && echo "✅ SSH key valid" || (echo "❌ SSH key invalid" && exit 1)

      - name: Sync dist to VPS
        run: |
          rsync -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            -avz --delete \
            ./dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.VPS_PATH }}/dist/

      - name: Fix permissions
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "chmod -R 755 ${{ secrets.VPS_PATH }}/dist/"

      - name: Update VPS git and restart services
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.VPS_PATH }} && git fetch origin && git reset --hard origin/main && \
             cd server && npm ci --omit=dev && cd .. && \
             (pm2 restart cortexbuild-api 2>/dev/null || true)"

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.cortexbuildpro.com)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Deployment verified - HTTP $STATUS"
          else
            echo "❌ Deployment verification failed - HTTP $STATUS"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'VPS Deploy',
              description: 'Deployment failed - check workflow logs'
            })
