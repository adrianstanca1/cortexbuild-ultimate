name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx eslint src --ext .ts,.tsx --quiet
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST || secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USERNAME || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 2m
          command_timeout: 10m
          script: |
            set -euo pipefail
            export PROJECT_DIR=/root/cortexbuild-ultimate
            
            # Pull cod și build
            cd "$PROJECT_DIR"
            git fetch origin
            git reset --hard origin/main
            
            # Build imagine
            docker build -t cortexbuild-ultimate-api:latest -f Dockerfile.api .
            
            # Restart API (postgres și redis rămân running)
            docker-compose stop api 2>/dev/null || true
            docker-compose up -d api
            
            # Așteaptă health
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              curl -fsS http://localhost:3001/api/health >/dev/null 2>&1 && break
              sleep 2
            done
            
            curl -fsS http://localhost:3001/api/health || { echo "❌ Health failed"; docker logs --tail 20 cortexbuild-api; exit 1; }
            
            # Reload nginx
            systemctl reload nginx 2>/dev/null || true
            
            echo "✅ Deploy complete"

      - name: Verify HTTPS
        run: |
          for i in $(seq 1 20); do
            curl -fsS https://www.cortexbuildpro.com/api/health >/dev/null 2>&1 && break
            sleep 3
          done
          curl -fsS https://www.cortexbuildpro.com/api/health || { echo "❌ External health failed"; exit 1; }
          echo "✅ HTTPS verified"
