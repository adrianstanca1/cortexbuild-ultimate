name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors only)
        run: npx eslint src --ext .ts,.tsx --quiet

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            # Copy deploy scripts
            mkdir -p /root
            cat > /root/deploy-frontend.sh << 'DEPLOYEOF'
            #!/bin/bash
            set -euo pipefail
            echo "=== CortexBuild Frontend Deploy ==="
            PROJECT_DIR="/var/www/cortexbuild-ultimate"
            cd "$PROJECT_DIR"
            git pull origin main
            npm ci --ignore-scripts
            npm run build
            chown -R www-data:www-data "$PROJECT_DIR/dist"
            echo "=== Frontend Deploy Complete ==="
            DEPLOYEOF
            cat > /root/deploy-api.sh << 'DEPLOYEOF'
            #!/bin/bash
            set -euo pipefail
            echo "=== CortexBuild API Deploy ==="
            PROJECT_DIR="/var/www/cortexbuild-ultimate"
            CONTAINER_NAME="cortexbuild-api"
            IMAGE_NAME="cortexbuild-ultimate-api:latest"
            cd "$PROJECT_DIR"

            # Source environment variables if .env exists
            if [ -f "$PROJECT_DIR/.env" ]; then
              set -a
              source "$PROJECT_DIR/.env"
              set +a
            fi

            git pull origin main
            docker build -t "$IMAGE_NAME" -f Dockerfile.api .
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart always \
              --network cortexbuild \
              -e DB_HOST=cortexbuild-db \
              -e DB_PORT=5432 \
              -e DB_NAME=cortexbuild \
              -e DB_USER=cortexbuild \
              -e DB_PASSWORD \
              -e JWT_SECRET \
              -e SESSION_SECRET \
              -e REDIS_HOST=cortexbuild-redis \
              -e PORT=3001 \
              -e NODE_ENV=production \
              -e OLLAMA_HOST=http://cortexbuild-ollama:11434 \
              -e OLLAMA_MODEL=qwen3.5:latest \
              -e CORS_ORIGIN=https://www.cortexbuildpro.com,https://cortexbuildpro.com \
              -e FRONTEND_URL=https://www.cortexbuildpro.com \
              "$IMAGE_NAME"
            echo "Waiting for API health..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/health >/dev/null 2>&1; then
                echo "API healthy"
                break
              fi
              sleep 2
            done
            echo "=== API Deploy Complete ==="
            DEPLOYEOF
            chmod +x /root/deploy-frontend.sh /root/deploy-api.sh

            # Run frontend deploy
            bash /root/deploy-frontend.sh

            # Run API deploy
            bash /root/deploy-api.sh

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://www.cortexbuildpro.com/api/health)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Deployment verified - HTTP $STATUS"
          else
            echo "❌ Deployment verification failed - HTTP $STATUS"
            exit 1
          fi
