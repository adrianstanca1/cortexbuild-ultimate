name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.132.43
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 12m
          script: |
            set -e
            cd /var/www/cortexbuild-ultimate
            echo "Pulling latest code..."
            git pull origin main
            echo "Installing any new dependencies..."
            npm ci --prefer-offline 2>/dev/null || npm install
            echo "Building frontend..."
            npm run build
            echo "Restarting nginx..."
            docker restart cortexbuild-nginx
            sleep 3
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://www.cortexbuildpro.com/ || echo "000")
            echo "Site status: $STATUS"
            [ "$STATUS" = "200" ] && echo "cortexbuildpro.com is live" || (echo "WARNING: status $STATUS"; docker logs cortexbuild-nginx --tail=10)

