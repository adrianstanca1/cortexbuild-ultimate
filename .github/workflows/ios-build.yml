name: iOS Build

on:
  push:
    branches: [main, feature/ios-capacitor]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'vite.config.ts'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.ts'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  NODE_VERSION: '20'
  XCODE_VERSION: '16.2'

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Resolve Swift Package dependencies
        working-directory: ios/App
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -workspace App.xcworkspace \
            -scheme App

      - name: Build iOS Debug (Simulator)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Build iOS Release (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/CortexBuild.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty

      - name: Package simulator .app as zip
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: ios/App
        run: |
          set -euo pipefail
          APP_PATH=$(find DerivedData -path '*/Build/Products/Debug-iphonesimulator/App.app' -print -quit)
          if [ -n "$APP_PATH" ]; then
            mkdir -p artifacts
            zip -r artifacts/CortexBuild-iOS-simulator.zip "$APP_PATH"
            echo "Packaged $APP_PATH"
          else
            echo "No App.app in Debug-iphonesimulator; listing DerivedData:" >&2
            find DerivedData -name "*.app" | head -20 || true
            exit 1
          fi

      - name: Upload simulator artifact
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v6
        with:
          name: CortexBuild-iOS-Simulator-${{ github.sha }}
          path: ios/App/artifacts/CortexBuild-iOS-simulator.zip
          retention-days: 14
          if-no-files-found: warn

      - name: Upload release archive artifact
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v6
        with:
          name: CortexBuild-xcarchive-${{ github.sha }}
          path: ios/App/build/CortexBuild.xcarchive
          retention-days: 14
          if-no-files-found: warn

  test-web:
    name: Tests & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings=0

      - name: Unit tests
        run: npx vitest run --reporter=verbose

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
