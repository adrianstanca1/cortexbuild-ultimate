<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />
    <title>Offline — CortexBuild</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #f97316, #ea580c);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3);
      }
      .icon svg { width: 40px; height: 40px; color: #0f172a; }
      h1 {
        font-size: 24px;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 15px;
        color: #94a3b8;
        max-width: 360px;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 24px;
        width: 100%;
        max-width: 400px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        margin-bottom: 16px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ef4444;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #f97316, #ea580c);
        color: #0f172a;
        font-weight: 700;
        font-size: 14px;
        padding: 12px 24px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 0.2s, transform 0.1s;
      }
      .btn:hover { opacity: 0.9; transform: translateY(-1px); }
      .btn:active { transform: translateY(0); }
      .btn svg { width: 16px; height: 16px; }
      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #64748b;
      }
      .logo {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #f97316;
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10" />
      </svg>
    </div>
    <div class="card">
      <div class="status">
        <span class="status-dot"></span>
        You're offline
      </div>
      <h1>No Internet Connection</h1>
      <p>CortexBuild needs an internet connection to sync your data. Your cached content is still available.</p>
      <a href="/" class="btn" onclick="location.reload(); return false;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 0 0 4.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 0 1-15.357-2m15.357 2H15" />
        </svg>
        Try Again
      </a>
      <p class="hint">Cached data is still viewable offline</p>
    </div>
    <div class="logo">CortexBuild Ultimate</div>
  </body>
</html>
